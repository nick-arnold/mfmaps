name: SMAP Soil Moisture Download

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC daily
  workflow_dispatch:       # allow manual trigger

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gdal-bin python3-gdal tippecanoe
          pip install h5py numpy rasterio requests awscli
          pip install git+https://github.com/mapbox/mbutil.git
          wget -q https://github.com/protomaps/go-pmtiles/releases/download/v1.22.3/go-pmtiles_1.22.3_Linux_x86_64.tar.gz -O pmtiles.tar.gz
          tar -xf pmtiles.tar.gz pmtiles
          sudo mv pmtiles /usr/local/bin/

      - name: Write netrc
        run: |
          echo "machine urs.earthdata.nasa.gov login ${{ secrets.EARTHDATA_USERNAME }} password ${{ secrets.EARTHDATA_PASSWORD }}" > ~/.netrc
          chmod 600 ~/.netrc

      - name: Download and convert SMAP to GeoTIFF
        run: |
          python3 << 'PYEOF'
          import requests, h5py, numpy as np, rasterio, os
          from rasterio.transform import from_bounds
          from rasterio.crs import CRS
          from datetime import datetime, timedelta

          today = datetime.utcnow()
          start = (today - timedelta(days=6)).strftime('%Y-%m-%d')
          end = today.strftime('%Y-%m-%d')
          url = f"https://cmr.earthdata.nasa.gov/search/granules.json?short_name=SPL3SMP_E&version=006&temporal={start},{end}&page_size=4&sort_key=-start_date"
          r = requests.get(url)
          granules = r.json()['feed']['entry']
          if not granules:
              raise RuntimeError('No granules found')

          date_str = granules[0]['time_start'][:10]
          with open('SMAP_DATE', 'w') as f:
              f.write(date_str)

          tif_files = []
          for granule in granules:
              g_date = granule['time_start'][:10]
              links = granule['links']
              try:
                  h5_url = next(l['href'] for l in links if l['href'].endswith('.h5') and 'nsidc' in l['href'])
              except StopIteration:
                  continue
              filename = h5_url.split('/')[-1]
              print(f'Downloading {filename} for {g_date}')

              session = requests.Session()
              r = session.get(h5_url, stream=True)
              r.raise_for_status()
              with open(filename, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)

              with h5py.File(filename, 'r') as f:
                  am = f['Soil_Moisture_Retrieval_Data_AM']
                  sm_am = am['soil_moisture'][:]
                  lats = am['latitude'][:]
                  lons = am['longitude'][:]
                  pm = f['Soil_Moisture_Retrieval_Data_PM']
                  sm_pm = pm['soil_moisture_pm'][:]

              sm_am = np.where(sm_am == -9999.0, np.nan, sm_am)
              sm_pm = np.where(sm_pm == -9999.0, np.nan, sm_pm)
              sm = np.where(np.isnan(sm_am), sm_pm, sm_am)
              lats = np.where(lats == -9999.0, np.nan, lats)
              lons = np.where(lons == -9999.0, np.nan, lons)

              lat_min, lat_max = float(np.nanmin(lats)), float(np.nanmax(lats))
              lon_min, lon_max = float(np.nanmin(lons)), float(np.nanmax(lons))
              rows, cols = sm.shape
              transform = from_bounds(lon_min, lat_min, lon_max, lat_max, cols, rows)
              if lats[0, 0] > lats[-1, 0]:
                  sm = np.flipud(sm)

              tif_name = f'smap_{g_date}.tif'
              with rasterio.open(tif_name, 'w', driver='GTiff',
                  height=rows, width=cols, count=1, dtype='float32',
                  crs=CRS.from_epsg(4326), transform=transform,
                  nodata=np.nan, compress='deflate') as dst:
                  dst.write(sm.astype('float32'), 1)
              tif_files.append(tif_name)
              print(f'Wrote {tif_name}')

          # Write file list for gdalbuildvrt
          with open('tif_list.txt', 'w') as f:
              f.write('\n'.join(tif_files))
          print(f'Downloaded {len(tif_files)} granules: {tif_files}')
          PYEOF

      - name: Mosaic last 4 days
        run: |
          # Build VRT with most-recent-first priority (first file wins where data exists)
          gdalbuildvrt -input_file_list tif_list.txt \
            -resolution highest \
            -srcnodata nan \
            -vrtnodata nan \
            smap_mosaic.vrt
          # Flatten to GeoTIFF
          gdal_translate -of GTiff -co COMPRESS=DEFLATE \
            smap_mosaic.vrt smap_raw.tif
          echo "Mosaic complete"
          gdalinfo -stats smap_raw.tif | grep -E "Minimum|Maximum|Mean|Valid"

      - name: Reproject to Web Mercator
        run: |
          gdalwarp -t_srs EPSG:3857 -r bilinear \
            -tr 9000 9000 \
            -srcnodata nan \
            -dstnodata nan \
            smap_raw.tif smap_3857.tif

      - name: Colorize raster (YlGnBu)
        run: |
          cat > colormap.txt << 'COLOREOF'
          nv    0   0   0   0
          0.00 255 255 217 255
          0.05 237 248 177 255
          0.10 199 233 180 255
          0.15 127 205 187 255
          0.20 65  182 196 255
          0.25 29  145 192 255
          0.35 34   94 168 255
          0.50 37   52 148 255
          0.70  8   29  88 255
          COLOREOF
          gdaldem color-relief smap_3857.tif colormap.txt smap_colored.tif -alpha

      - name: Generate raster PMTiles
        run: |
          DATE=$(cat SMAP_DATE | tr -d '-')
          gdal2tiles.py --zoom=3-8 --xyz --resampling=bilinear --processes=4 smap_colored.tif tiles_raster/
          mb-util --image_format=png tiles_raster/ smap_raster.mbtiles
          pmtiles convert smap_raster.mbtiles smap_raster_${DATE}.pmtiles
          cp smap_raster_${DATE}.pmtiles smap_raster_latest.pmtiles

      - name: Generate isoline PMTiles
        run: |
          DATE=$(cat SMAP_DATE | tr -d '-')
          gdalwarp -t_srs EPSG:3857 -r bilinear \
            -tr 1000 1000 \
            -srcnodata nan \
            -dstnodata nan \
            smap_raw.tif smap_1km.tif
          gdal_contour -a soil_moisture -i 0.05 \
            -f GeoJSON smap_1km.tif isolines.geojson
          tippecanoe \
            --output=smap_isolines_${DATE}.pmtiles \
            --minimum-zoom=3 \
            --maximum-zoom=8 \
            --layer=isolines \
            --drop-densest-as-needed \
            --force \
            isolines.geojson
          cp smap_isolines_${DATE}.pmtiles smap_isolines_latest.pmtiles

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          DATE=$(cat SMAP_DATE | tr -d '-')
          EP="--endpoint-url https://sfo3.digitaloceanspaces.com"

          aws s3 cp smap_raw.tif s3://mfmaps-source/soil-moisture/smap_${DATE}.tif $EP --acl public-read

          aws s3 cp smap_raster_${DATE}.pmtiles s3://mfmaps-tiles/soil-moisture/raster/smap_raster_${DATE}.pmtiles $EP --acl public-read
          aws s3 cp smap_raster_latest.pmtiles s3://mfmaps-tiles/soil-moisture/raster/smap_raster_latest.pmtiles $EP --acl public-read

          aws s3 cp smap_isolines_${DATE}.pmtiles s3://mfmaps-tiles/soil-moisture/isolines/smap_isolines_${DATE}.pmtiles $EP --acl public-read
          aws s3 cp smap_isolines_latest.pmtiles s3://mfmaps-tiles/soil-moisture/isolines/smap_isolines_latest.pmtiles $EP --acl public-read

          echo "Done"
