{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Maps — Map</title>
    <meta name="description" content="MF Maps interactive map application.">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- MapLibre GL JS -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">

    <!-- App styles -->
    <link href="{% static 'map/css/map.css' %}" rel="stylesheet">
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Top-right: Layers button -->
    <button class="btn btn-light layers-btn shadow-sm" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#layersPanel"
            aria-controls="layersPanel">
        <i class="bi bi-layers"></i>
        <span class="d-none d-md-inline ms-1">Layers</span>
    </button>

    <!-- Bottom-right: custom query toggle (zoom + geolocate added by MapLibre) -->
    <div class="map-controls-br">
        <button id="queryToggle" class="btn btn-light shadow-sm" type="button"
                title="Query map features"
                aria-pressed="false">
            <i class="bi bi-cursor"></i>
        </button>
    </div>

    <!-- Off-canvas layer panel -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="layersPanel"
         aria-labelledby="layersPanelLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="layersPanelLabel">Layers &amp; Tools</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                    aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">

            <!-- Free layers -->
            <h6 class="text-uppercase text-muted small fw-bold mb-2">Free Layers</h6>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input layer-toggle" type="checkbox"
                       id="layer-random-points" data-layer-group="random-points">
                <label class="form-check-label" for="layer-random-points">
                    Random demo points
                </label>
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input layer-toggle" type="checkbox"
                       id="layer-h3-hexes" data-layer-group="h3-hexes">
                <label class="form-check-label" for="layer-h3-hexes">
                    H3 aggregation
                </label>
            </div>

            <!-- Premium layers (locked for now) -->
            <h6 class="text-uppercase text-muted small fw-bold mb-2 mt-4">
                Premium Layers
                <i class="bi bi-lock-fill ms-1"></i>
            </h6>
            <div class="form-check form-switch mb-2 opacity-50">
                <input class="form-check-input" type="checkbox" disabled>
                <label class="form-check-label">Morel probability</label>
            </div>
            <div class="form-check form-switch mb-2 opacity-50">
                <input class="form-check-input" type="checkbox" disabled>
                <label class="form-check-label">Burn severity</label>
            </div>
            <div class="form-check form-switch mb-2 opacity-50">
                <input class="form-check-input" type="checkbox" disabled>
                <label class="form-check-label">Soil temperature</label>
            </div>
            <p class="small text-muted mt-2">
                Sign in to a paid plan to unlock premium layers.
            </p>

            <hr class="my-4">

            <!-- Demo tools -->
            <h6 class="text-uppercase text-muted small fw-bold mb-3">Demo Tools</h6>
            <div class="d-grid gap-2 mb-3">
                <button id="addRandomPoints" class="btn btn-outline-dark btn-sm">
                    <i class="bi bi-shuffle"></i> Add 50 random points
                </button>
                <button id="clearDemo" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-trash"></i> Clear demo
                </button>
            </div>

            <!-- User location info -->
            <h6 class="text-uppercase text-muted small fw-bold mb-2 mt-4">Your Location</h6>
            <div id="userLocationInfo" class="small text-muted">
                Use the locate button on the map to find your H3 cell.
            </div>
        </div>
    </div>

    <!-- Query result popover -->
    <div id="queryResult" class="query-result shadow-sm d-none">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <strong class="small">Query result</strong>
            <button type="button" class="btn-close btn-close-sm" aria-label="Close"
                    onclick="document.getElementById('queryResult').classList.add('d-none')"></button>
        </div>
        <div id="queryResultBody" class="small"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <!-- h3-js -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <!-- App -->
    <script src="{% static 'map/js/map.js' %}"></script>
</body>
</html>
