<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree Species Color Editor</title>
<link href="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
        color: #222;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    h1 { font-size: 1.1rem; margin: 0; padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; }
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 16px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        flex-wrap: wrap;
    }
    .controls select, .controls input[type="text"] {
        padding: 6px 10px;
        font-size: 0.9rem;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .controls input[type="text"] { flex: 1; min-width: 200px; }
    .controls button {
        padding: 6px 14px;
        font-size: 0.85rem;
        background: #2c5530;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .controls button:hover { background: #1e3d22; }
    .controls button.secondary { background: #6c757d; }
    .controls button.secondary:hover { background: #565e64; }
    .controls .count { font-size: 0.8rem; color: #666; }
    .controls .status { font-size: 0.8rem; color: #888; }

    .layout {
        display: flex;
        flex: 1;
        min-height: 0;
    }
    .panel-left {
        width: 560px;
        max-width: 50%;
        overflow-y: auto;
        background: #f5f5f5;
        padding: 12px;
        box-sizing: border-box;
    }
    .panel-right {
        flex: 1;
        position: relative;
        background: #ddd;
    }
    #map { position: absolute; inset: 0; }

    table {
        width: 100%;
        background: #fff;
        border-collapse: collapse;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    th, td {
        padding: 6px 10px;
        text-align: left;
        border-bottom: 1px solid #eee;
        font-size: 0.82rem;
        vertical-align: middle;
    }
    th { background: #fafafa; font-weight: 600; color: #555; position: sticky; top: 0; z-index: 1; }
    tr:hover { background: #fafbfc; }
    tr.highlighted {
        background: #fff3bf !important;
        outline: 2px solid #f08c00;
        outline-offset: -2px;
    }
    tr.pinned {
        background: #ffd166 !important;
        outline: 2px solid #f08c00;
        outline-offset: -2px;
    }
    .swatch {
        width: 32px;
        height: 22px;
        border: 1px solid rgba(0,0,0,0.2);
        border-radius: 3px;
        cursor: pointer;
        padding: 0;
    }
    .code { font-family: monospace; color: #888; font-size: 0.75rem; }
    .hex-input {
        font-family: monospace;
        font-size: 0.8rem;
        width: 80px;
        padding: 3px 5px;
        border: 1px solid #ddd;
        border-radius: 3px;
    }
    .changed { background: #fffbe6; }

    .opacity-control {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: #666;
    }
    .opacity-control input[type="range"] { width: 100px; }

    .map-tooltip {
        position: absolute;
        pointer-events: none;
        background: rgba(20, 20, 20, 0.9);
        color: #fff;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 0.78rem;
        line-height: 1.35;
        z-index: 9999;
        display: none;
        max-width: 260px;
        word-wrap: break-word;
    }
</style>
</head>
<body>

<h1>Tree Species Color Editor</h1>

<div class="controls">
    <select id="region">
        <option value="ak">Alaska</option>
        <option value="hi">Hawaii</option>
        <option value="conus">CONUS</option>
    </select>
    <input type="text" id="search" placeholder="Search forest type or code...">
    <span class="count" id="count"></span>
    <span class="status" id="status"></span>
    <div class="opacity-control">
        <label for="opacity">Opacity</label>
        <input type="range" id="opacity" min="0" max="100" value="80">
        <span id="opacityVal">80%</span>
    </div>
    <button id="download">Download JSON</button>
    <button id="reset" class="secondary">Reset to source</button>
</div>

<div class="layout">
    <div class="panel-left">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">Code</th>
                    <th style="width: 60px;">Color</th>
                    <th style="width: 100px;">Hex</th>
                    <th>Name</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
    <div class="panel-right">
        <div id="map"></div>
        <div id="mapTooltip" class="map-tooltip"></div>
    </div>
</div>

<script>
    window.MFMAPS_STYLE_URL = "{% static 'map/styles/bright-mfmaps.json' %}";
</script>
<script src="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>

<script>
// =============================================================================
// Region configuration
//
// lookupType: 'data-tile'  - new architecture (CONUS): display tile is full
//                            color RGBA, separate data tile encodes FORTYPCD
//                            per pixel as R high byte + G low byte.
//             'alpha-index' - old architecture (AK/HI for now): alpha channel
//                             of the display tile encodes a species index.
// =============================================================================
const REGIONS = {
    ak: {
        legendUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/landfire_evt_ak_legend.json',
        pmtilesUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/landfire_evt_ak.pmtiles',
        dataPmtilesUrl: null,
        center: [-149.9, 64.5],
        zoom: 5,
        maxZoom: 14,
        lookupType: 'alpha-index',
    },
    hi: {
        legendUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/landfire_evt_hi_legend.json',
        pmtilesUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/landfire_evt_hi.pmtiles',
        dataPmtilesUrl: null,
        center: [-156.4, 20.7],
        zoom: 7,
        maxZoom: 14,
        lookupType: 'alpha-index',
    },
    conus: {
        legendUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/treemap_composite_conus_legend.json',
        pmtilesUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/treemap_composite_conus.pmtiles',
        dataPmtilesUrl: 'https://mfmaps-tiles.sfo3.cdn.digitaloceanspaces.com/tree-species/treemap_composite_conus_data.pmtiles',
        center: [-122.6, 44.0],
        zoom: 6,
        maxZoom: 14,
        lookupType: 'data-tile',
    },
};

// =============================================================================
// State
// =============================================================================
const STORAGE_KEY = 'mfmaps-legend-edits';

let data = {};
let alphaToCode = new Map();   // only used for AK/HI alpha-index lookup
let conusOriginal = null;
let currentRegion = 'ak';
let map = null;
let displayTileCache = new Map();  // cacheKey -> ImageData (raw display tile)
let dataTileCache = new Map();     // cacheKey -> ImageData (data tile, CONUS only)
let pinnedCode = null;
let pmtilesInstance = null;        // display PMTiles for current region
let dataPmtilesInstance = null;    // data PMTiles for current region (null for AK/HI)

const rowsEl = document.getElementById('rows');
const countEl = document.getElementById('count');
const statusEl = document.getElementById('status');
const searchEl = document.getElementById('search');
const regionEl = document.getElementById('region');
const opacityEl = document.getElementById('opacity');
const opacityValEl = document.getElementById('opacityVal');
const tooltipEl = document.getElementById('mapTooltip');

// =============================================================================
// localStorage persistence
// =============================================================================
function loadSavedEdits(region) {
    try {
        const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        return all[region] || {};
    } catch {
        return {};
    }
}

function saveEdit(region, code, rgb, hex) {
    let all;
    try { all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { all = {}; }
    if (!all[region]) all[region] = {};
    all[region][code] = { rgb, hex };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

function clearSavedEdits(region) {
    let all;
    try { all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { all = {}; }
    delete all[region];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

let _stagingSaveTimer = null;

function scheduleStagingSave() {
    clearTimeout(_stagingSaveTimer);
    _stagingSaveTimer = setTimeout(saveStaging, 800);
}

async function saveStaging() {
    statusEl.textContent = 'Saving…';
    const out = denormalizeForExport(data, currentRegion);
    try {
        const resp = await fetch(`/tools/legend-editor/save/${currentRegion}/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(out),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        statusEl.textContent = 'Saved ✓';
        setTimeout(() => { if (statusEl.textContent === 'Saved ✓') statusEl.textContent = ''; }, 2000);
    } catch (err) {
        statusEl.textContent = `Save failed: ${err.message}`;
    }
}

// =============================================================================
// Color utilities
// =============================================================================
function hexToRgb(hex) {
    const m = hex.replace('#', '').match(/^([0-9a-f]{6})$/i);
    if (!m) return null;
    const n = parseInt(m[1], 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

// =============================================================================
// Legend normalization
//
// CONUS new format: { by_fortypcd: { code: { name, rgb, hex } } }
// CONUS old format (alpha trick): { by_fortypcd: { code: { name, rgb, hex, alpha } }, by_alpha: {...} }
// AK/HI new format: { by_evt_code: { code: { name, rgb, hex, alpha } }, by_alpha: {...} }
// AK/HI old flat format: { code: { name, rgb, hex } }
//
// We normalize all to a flat { code: { name, rgb, hex, _alpha? } } for editing.
// =============================================================================
function normalizeLoad(raw, region) {
    alphaToCode = new Map();
    if (region === 'conus') {
        // CONUS legend always has by_fortypcd at top level
        if (raw.by_fortypcd) {
            conusOriginal = raw;
            const flat = {};
            for (const [code, info] of Object.entries(raw.by_fortypcd)) {
                flat[code] = { name: info.name, rgb: info.rgb, hex: info.hex };
                if (info.alpha != null) {
                    flat[code]._alpha = info.alpha;
                    alphaToCode.set(info.alpha, code);
                }
            }
            return flat;
        }
        conusOriginal = null;
        return raw;
    }
    // AK/HI
    if (raw.by_evt_code) {
        conusOriginal = null;
        const flat = {};
        for (const [code, info] of Object.entries(raw.by_evt_code)) {
            flat[code] = { name: info.name, rgb: info.rgb, hex: info.hex, _alpha: info.alpha };
            if (info.alpha != null) alphaToCode.set(info.alpha, code);
        }
        return flat;
    }
    conusOriginal = null;
    return raw;
}

function denormalizeForExport(flat, region) {
    if (region === 'conus') {
        const out = { by_fortypcd: {} };
        for (const [code, info] of Object.entries(flat)) {
            out.by_fortypcd[code] = {
                name: info.name,
                rgb: info.rgb,
                hex: info.hex,
            };
        }
        return out;
    }
    const hasAlpha = Object.values(flat).some(v => v._alpha != null);
    if (hasAlpha) {
        const out = { by_evt_code: {}, by_alpha: {} };
        for (const [code, info] of Object.entries(flat)) {
            const alpha = info._alpha;
            out.by_evt_code[code] = {
                name: info.name,
                rgb: info.rgb,
                hex: info.hex,
                alpha: alpha,
            };
            if (alpha != null) {
                out.by_alpha[String(alpha)] = {
                    evt_code: parseInt(code, 10),
                    name: info.name,
                    hex: info.hex,
                };
            }
        }
        return out;
    }
    const out = {};
    for (const [code, info] of Object.entries(flat)) {
        out[code] = { name: info.name, rgb: info.rgb, hex: info.hex };
    }
    return out;
}

// =============================================================================
// Rendering the legend table
// =============================================================================
function render(filterText = '') {
    const filter = filterText.toLowerCase();
    rowsEl.innerHTML = '';
    let visible = 0;

    const codes = Object.keys(data).sort((a, b) =>
        data[a].name.localeCompare(data[b].name)
    );

    const savedEdits = loadSavedEdits(currentRegion);

    for (const code of codes) {
        const entry = data[code];
        if (filter && !entry.name.toLowerCase().includes(filter)
                   && !code.toLowerCase().includes(filter)) {
            continue;
        }
        visible++;
        const tr = document.createElement('tr');
        tr.dataset.code = code;
        if (savedEdits[code]) tr.classList.add('changed');
        tr.innerHTML = `
            <td class="code">${code}</td>
            <td>
                <input type="color" class="swatch" value="${entry.hex}"
                       data-code="${code}">
            </td>
            <td>
                <input type="text" class="hex-input" value="${entry.hex}"
                       data-code="${code}" maxlength="7">
            </td>
            <td>${entry.name}</td>
        `;
        rowsEl.appendChild(tr);
    }

    countEl.textContent = `${visible} of ${codes.length} entries`;

    rowsEl.querySelectorAll('input[type="color"]').forEach(input => {
        input.addEventListener('input', e => updateColor(e.target.dataset.code, e.target.value));
    });
    rowsEl.querySelectorAll('.hex-input').forEach(input => {
        input.addEventListener('change', e => {
            const v = e.target.value.trim();
            const normalized = v.startsWith('#') ? v : '#' + v;
            if (hexToRgb(normalized)) {
                updateColor(e.target.dataset.code, normalized);
            } else {
                e.target.value = data[e.target.dataset.code].hex;
            }
        });
    });
}

function updateColor(code, hex) {
    const rgb = hexToRgb(hex);
    if (!rgb) return;
    data[code].hex = hex;
    data[code].rgb = rgb;

    saveEdit(currentRegion, code, rgb, hex);
    scheduleStagingSave();

    const tr = rowsEl.querySelector(`tr[data-code="${code}"]`);
    if (tr) {
        tr.classList.add('changed');
        tr.querySelector('input[type="color"]').value = hex;
        tr.querySelector('.hex-input').value = hex;
    }
    refreshMapLayer();
}

function highlightRow(code) {
    if (pinnedCode != null) return;
    rowsEl.querySelectorAll('tr.highlighted').forEach(tr => tr.classList.remove('highlighted'));
    if (code == null) return;
    const tr = rowsEl.querySelector(`tr[data-code="${code}"]`);
    if (tr) {
        tr.classList.add('highlighted');
        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function togglePin(code) {
    if (pinnedCode === code) {
        pinnedCode = null;
        rowsEl.querySelectorAll('tr.pinned').forEach(tr => tr.classList.remove('pinned'));
    } else {
        pinnedCode = code;
        rowsEl.querySelectorAll('tr.highlighted, tr.pinned').forEach(tr => {
            tr.classList.remove('highlighted');
            tr.classList.remove('pinned');
        });
        const tr = rowsEl.querySelector(`tr[data-code="${code}"]`);
        if (tr) {
            tr.classList.add('pinned');
            tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
}

// =============================================================================
// Tile fetching helpers
// =============================================================================
async function fetchAndDecodeTile(pmtilesInst, z, x, y) {
    const tile = await pmtilesInst.getZxy(z, x, y);
    if (!tile) return null;
    const blob = new Blob([tile.data], { type: 'image/png' });
    const bitmap = await createImageBitmap(blob);
    const c = document.createElement('canvas');
    c.width = bitmap.width; c.height = bitmap.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    return ctx.getImageData(0, 0, c.width, c.height);
}

async function getDisplayTile(z, x, y) {
    const key = `${z}/${x}/${y}`;
    if (displayTileCache.has(key)) return displayTileCache.get(key);
    const imgData = await fetchAndDecodeTile(pmtilesInstance, z, x, y);
    if (displayTileCache.size > 300) {
        const k = displayTileCache.keys().next().value;
        displayTileCache.delete(k);
    }
    displayTileCache.set(key, imgData);
    return imgData;
}

async function getDataTile(z, x, y) {
    if (!dataPmtilesInstance) return null;
    const key = `${z}/${x}/${y}`;
    if (dataTileCache.has(key)) return dataTileCache.get(key);
    const imgData = await fetchAndDecodeTile(dataPmtilesInstance, z, x, y);
    if (dataTileCache.size > 300) {
        const k = dataTileCache.keys().next().value;
        dataTileCache.delete(k);
    }
    dataTileCache.set(key, imgData);
    return imgData;
}

// =============================================================================
// Map + tile recoloring
// =============================================================================
const RECOLOR_PROTOCOL = 'recolor';

// For CONUS (data-tile): recolor each display pixel by looking up the matching
// data tile's FORTYPCD at the same (px, py) and using the legend's current color.
// For AK/HI (alpha-index): recolor by alpha channel as before.
function recolorPixels(displayImageData, dataImageData, lookupType) {
    const px = displayImageData.data;
    if (lookupType === 'data-tile' && dataImageData) {
        const dp = dataImageData.data;
        for (let i = 0; i < px.length; i += 4) {
            const a = px[i + 3];
            if (a === 0) continue;
            const fortypcd = (dp[i] << 8) | dp[i + 1];
            if (fortypcd === 0) continue;
            const info = data[String(fortypcd)];
            if (!info) continue;
            px[i] = info.rgb[0];
            px[i + 1] = info.rgb[1];
            px[i + 2] = info.rgb[2];
        }
        return;
    }
    // alpha-index path
    for (let i = 0; i < px.length; i += 4) {
        const a = px[i + 3];
        if (a === 0) continue;
        const code = alphaToCode.get(a);
        if (!code) continue;
        const rgb = data[code]?.rgb;
        if (!rgb) continue;
        px[i] = rgb[0];
        px[i + 1] = rgb[1];
        px[i + 2] = rgb[2];
    }
}

async function setupMapForRegion(region) {
    const cfg = REGIONS[region];

    if (!window._protocolsRegistered) {
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol('pmtiles', protocol.tile);
        maplibregl.addProtocol(RECOLOR_PROTOCOL, recolorProtocolViaPmtiles);
        window._protocolsRegistered = true;
    }

    pmtilesInstance = new pmtiles.PMTiles(cfg.pmtilesUrl);
    dataPmtilesInstance = cfg.dataPmtilesUrl
        ? new pmtiles.PMTiles(cfg.dataPmtilesUrl)
        : null;

    if (!map) {
        map = new maplibregl.Map({
            container: 'map',
            style: window.MFMAPS_STYLE_URL,
            center: cfg.center,
            zoom: cfg.zoom,
        });

        map.on('mousemove', onMapHover);
        map.on('click', onMapClick);
        map.on('mouseout', () => {
            tooltipEl.style.display = 'none';
            highlightRow(null);
        });

        await new Promise(r => map.on('load', r));
    } else {
        map.setCenter(cfg.center);
        map.setZoom(cfg.zoom);
    }

    refreshMapLayer();
}

function refreshMapLayer() {
    if (!map) return;
    const cfg = REGIONS[currentRegion];

    if (map.getLayer('recolor-layer')) map.removeLayer('recolor-layer');
    if (map.getSource('recolor-source')) map.removeSource('recolor-source');

    const tileUrlPattern = `recolor://${cfg.pmtilesUrl}#{z}/{x}/{y}`;

    map.addSource('recolor-source', {
        type: 'raster',
        tiles: [tileUrlPattern],
        tileSize: 256,
        minzoom: 4,
        maxzoom: cfg.maxZoom,
    });
    map.addLayer({
        id: 'recolor-layer',
        type: 'raster',
        source: 'recolor-source',
        paint: {
            'raster-opacity': parseInt(opacityEl.value, 10) / 100,
            'raster-resampling': 'nearest',
        },
    });
}

function recolorProtocolViaPmtiles(params, abortController) {
    return new Promise(async (resolve, reject) => {
        try {
            const m = params.url.match(/^recolor:\/\/(.+)#(\d+)\/(\d+)\/(\d+)$/);
            if (!m) throw new Error('Bad recolor URL: ' + params.url);
            const z = parseInt(m[2], 10);
            const x = parseInt(m[3], 10);
            const y = parseInt(m[4], 10);

            const cfg = REGIONS[currentRegion];

            let displayImageData = await getDisplayTile(z, x, y);
            if (!displayImageData) {
                const c = document.createElement('canvas');
                c.width = 256; c.height = 256;
                const blob = await new Promise(r => c.toBlob(r, 'image/png'));
                const buf = await blob.arrayBuffer();
                resolve({ data: buf });
                return;
            }

            let dataImageData = null;
            if (cfg.lookupType === 'data-tile') {
                dataImageData = await getDataTile(z, x, y);
            }

            const out = new ImageData(
                new Uint8ClampedArray(displayImageData.data),
                displayImageData.width,
                displayImageData.height
            );
            recolorPixels(out, dataImageData, cfg.lookupType);

            const c = document.createElement('canvas');
            c.width = out.width; c.height = out.height;
            const ctx = c.getContext('2d');
            ctx.putImageData(out, 0, 0);
            const blob = await new Promise(r => c.toBlob(r, 'image/png'));
            const buf = await blob.arrayBuffer();
            resolve({ data: buf });
        } catch (err) {
            reject(err);
        }
    });
}

// =============================================================================
// Hover: map → editor highlight + tooltip
// =============================================================================
function pixelAt(lngLat) {
    const cfg = REGIONS[currentRegion];
    const zoom = Math.min(cfg.maxZoom, Math.floor(map.getZoom()));
    const n = Math.pow(2, zoom);
    const xFloat = (lngLat.lng + 180) / 360 * n;
    const latRad = lngLat.lat * Math.PI / 180;
    const yFloat = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
    return {
        z: zoom,
        x: Math.floor(xFloat),
        y: Math.floor(yFloat),
        px: Math.floor((xFloat - Math.floor(xFloat)) * 256),
        py: Math.floor((yFloat - Math.floor(yFloat)) * 256),
    };
}

async function lookupSpeciesAt(lngLat) {
    const cfg = REGIONS[currentRegion];
    const { z, x, y, px, py } = pixelAt(lngLat);

    const displayImg = displayTileCache.get(`${z}/${x}/${y}`);
    if (!displayImg) return null;
    const idx = (py * 256 + px) * 4;
    const a = displayImg.data[idx + 3];
    if (a === 0) return null;

    if (cfg.lookupType === 'data-tile') {
        const dataImg = dataTileCache.get(`${z}/${x}/${y}`);
        if (!dataImg) return null;
        const fortypcd = (dataImg.data[idx] << 8) | dataImg.data[idx + 1];
        if (fortypcd === 0) return null;
        const code = String(fortypcd);
        return data[code] ? { code, ...data[code] } : null;
    }
    // alpha-index
    const code = alphaToCode.get(a);
    if (!code) return null;
    return data[code] ? { code, ...data[code] } : null;
}

async function onMapHover(e) {
    if (!pmtilesInstance) return;
    const hit = await lookupSpeciesAt(e.lngLat);
    if (!hit) {
        tooltipEl.style.display = 'none';
        highlightRow(null);
        return;
    }

    tooltipEl.innerHTML =
        `<div style="display:flex;align-items:flex-start;gap:6px;">
            <span style="display:inline-block;width:10px;height:10px;flex-shrink:0;margin-top:3px;
                background:${hit.hex};border:1px solid rgba(255,255,255,0.4);"></span>
            <span>${hit.name}</span>
        </div>`;
    tooltipEl.style.left = (e.point.x + 12) + 'px';
    tooltipEl.style.top = (e.point.y + 12) + 'px';
    tooltipEl.style.display = 'block';

    highlightRow(hit.code);
}

async function onMapClick(e) {
    if (!pmtilesInstance) return;
    const hit = await lookupSpeciesAt(e.lngLat);
    if (!hit) {
        togglePin(null);
        return;
    }
    togglePin(hit.code);
}

// =============================================================================
// Region load
// =============================================================================
async function loadRegion(region) {
    currentRegion = region;
    statusEl.textContent = 'Loading…';
    rowsEl.innerHTML = '';
    displayTileCache.clear();
    dataTileCache.clear();
    pinnedCode = null;
    try {
        // Try staging first, fall back to production
        const stagingUrl = REGIONS[region].legendUrl.replace('_legend.json', '_legend_staging.json');
        let raw = null;
        let fromStaging = false;
        try {
            const stagingResp = await fetch(stagingUrl, { cache: 'no-store' });
            if (stagingResp.ok) {
                raw = await stagingResp.json();
                fromStaging = true;
            }
        } catch {
            // Ignore staging fetch errors, fall through to production
        }
        if (!raw) {
            const resp = await fetch(REGIONS[region].legendUrl);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            raw = await resp.json();
        }

        data = normalizeLoad(raw, region);

        const edits = loadSavedEdits(region);
        for (const [code, edit] of Object.entries(edits)) {
            if (data[code]) {
                data[code].rgb = edit.rgb;
                data[code].hex = edit.hex;
            }
        }

        statusEl.textContent = fromStaging ? '(staging)' : '';
        render(searchEl.value);
        await setupMapForRegion(region);
    } catch (err) {
        statusEl.textContent = `Load failed: ${err.message}`;
    }
}

// =============================================================================
// Events
// =============================================================================
regionEl.addEventListener('change', e => loadRegion(e.target.value));
searchEl.addEventListener('input', e => render(e.target.value));

opacityEl.addEventListener('input', e => {
    const v = parseInt(e.target.value, 10);
    opacityValEl.textContent = `${v}%`;
    if (map && map.getLayer('recolor-layer')) {
        map.setPaintProperty('recolor-layer', 'raster-opacity', v / 100);
    }
});

document.getElementById('download').addEventListener('click', () => {
    const out = denormalizeForExport(data, currentRegion);
    const filename = currentRegion === 'conus'
        ? 'treemap_composite_conus_legend.json'
        : `landfire_evt_${currentRegion}_legend.json`;
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});

document.getElementById('reset').addEventListener('click', async () => {
    if (!confirm(
        `Reset ${currentRegion.toUpperCase()} to production colors?\n\n` +
        `This will:\n` +
        `  • Clear local edits in your browser\n` +
        `  • Delete the staging file on the server\n\n` +
        `Cannot be undone.`
    )) return;

    clearSavedEdits(currentRegion);

    try {
        const resp = await fetch(`/tools/legend-editor/delete-staging/${currentRegion}/`, {
            method: 'DELETE',
        });
        if (!resp.ok && resp.status !== 404) {
            const text = await resp.text();
            alert(`Server staging delete failed: ${resp.status}\n${text}\n\nLocal edits cleared anyway.`);
        }
    } catch (err) {
        alert(`Server staging delete failed: ${err.message}\n\nLocal edits cleared anyway.`);
    }

    loadRegion(currentRegion);
});

loadRegion('conus');
</script>
