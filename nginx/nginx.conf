# Upstream definitions: which Docker services to proxy to
upstream content_backend {
    server content:8000;
}

upstream map_backend {
    server map:8000;
}

# Redirect www to bare domain
server {
    listen 80;
    listen 443 ssl;
    server_name www.mfmaps.com;

    ssl_certificate /etc/letsencrypt/live/mfmaps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mfmaps.com/privkey.pem;

    return 301 https://mfmaps.com$request_uri;
}

# Content site: mfmaps.com
server {
    listen 80;
    server_name mfmaps.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mfmaps.com;

    ssl_certificate /etc/letsencrypt/live/mfmaps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mfmaps.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25M;

    # Django static files served directly by nginx
    location /static/ {
        alias /app/content_static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else: proxy to gunicorn
    location / {
        proxy_pass http://content_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# Map app: map.mfmaps.com
server {
    listen 80;
    server_name map.mfmaps.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name map.mfmaps.com;

    ssl_certificate /etc/letsencrypt/live/map.mfmaps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/map.mfmaps.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25M;

    location /static/ {
        alias /app/map_static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://map_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}